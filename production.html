<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Production</title>
  <link rel="icon" type="image/png" href="images/favicon.png">

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
    integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="css/navbar.css">

  <style>
    *,
    *::before,
    *::after {

      box-sizing: border-box;

    }

    html {

      scroll-behavior: smooth;

    }

    body {

      background: #111;

      color: #fff;

      font-family: 'Playfair Display', serif;

      margin: 0;

      padding: 0;

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      overflow-x: hidden;

    }

    /* Yıldız animasyonu kaldırıldı */

    .navbar {

      position: fixed;

      top: 0;
      left: 0;
      width: 100vw;

      height: 60px;

      background: rgba(0, 0, 0, 0.85);

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 0 2rem;

      z-index: 3000;

      box-shadow: 0 2px 16px #0002;

    }

    .logo {

      color: #fff;

      font-size: 1.7rem;

      font-family: 'Playfair Display', serif;

      font-weight: bold;

      text-decoration: none;

      letter-spacing: 0.1em;

    }

    .hamburger-wrapper {

      width: 40px;

      height: 40px;

      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;

      cursor: pointer;

    }

    .hamburger-wrapper .bar {

      width: 28px;

      height: 4px;

      background: #fff;

      margin: 3px 0;

      border-radius: 2px;

      display: block;

    }

    .mobile-menu {

      position: fixed;

      top: 60px;

      right: 0;

      width: 220px;

      height: calc(100vh - 60px);

      background: rgba(0, 0, 0, 0.97);

      transition: transform 0.3s;

      transform: translateX(100%);

      z-index: 2100;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;

      padding: 2rem 1.5rem;

      gap: 1.5rem;

      box-shadow: -2px 0 16px rgba(0, 0, 0, 0.2);

    }

    .mobile-menu.show {

      transform: translateX(0);

    }

    .mobile-menu ul {

      list-style: none;

      padding: 0;

      margin: 0;

      width: 100%;

      text-align: center;

    }

    .mobile-menu ul li {

      margin: 1.2rem 0;

    }

    .mobile-menu ul li a {

      color: #fff;

      font-size: 1.2rem;

      text-decoration: none;

      font-family: 'Playfair Display', serif;

      font-weight: 600;

      letter-spacing: 0.05em;

      transition: color 0.2s;

    }

    .mobile-menu ul li a:hover {

      color: #ffb300;

    }

    /* MAIN CONTENT */

    .page-wrapper {

      flex: 1;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      width: 100vw;

      min-height: calc(100vh - 60px);

      padding-top: 60px;

      box-sizing: border-box;

      z-index: 1;

    }

    .ourworks-header {

      text-align: left;

      margin-bottom: 2.2rem;

      position: relative;

      max-width: 1200px;

      margin-left: 0;

      margin-right: auto;

      padding-left: 2vw;

    }

    .ourworks-header h1 {

      font-family: 'Playfair Display', serif;

      font-size: 4.2rem;

      letter-spacing: 2px;

      color: #fff;

      font-weight: 700;

      margin-top: 2.5rem;

      margin-bottom: 0.5rem;

      text-shadow: none;

      position: relative;

      z-index: 2;

      text-align: left;

    }

    /* Ok */

    .down-arrow {

      display: flex;

      align-items: center;

      justify-content: flex-start;

      margin-top: 0.2rem;

      margin-left: 0.2rem;

      cursor: pointer;

      animation: bounce 1.5s infinite;

      z-index: 3;

      position: relative;

      width: 38px;

      height: 38px;

    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(12px);
      }

    }

    .works-grid {

      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

      gap: 3.5rem;

      justify-items: center;

      align-items: start;

      width: 100%;

      max-width: 100vw;

      margin: 0 auto;

      padding: 2rem;

    }



    .work-item {

      width: 100%;

      max-width: 400px;

      height: 520px;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;

      box-sizing: border-box;

    }



    .work-item:hover {

      transform: scale(1.06) translateY(-10px);

    }



    .work-item:hover {

      transform: scale(1.06) translateY(-10px);

      z-index: 2;

    }

    .work-item .spotlight {

      display: none;

    }

    .work-item .ai-spotlight {

      display: block;

      position: absolute;

      top: -60px;

      left: 50%;

      transform: translateX(-50%);

      width: 340px;

      height: 180px;

      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.32) 0%, rgba(255, 255, 255, 0.08) 60%, rgba(255, 255, 255, 0) 100%);

      z-index: 1;

      pointer-events: none;

      filter: blur(8px);

    }

    .work-item img,

    .work-item video {

      width: 100%;

      height: 480px;

      max-width: 400px;

      border-radius: 24px;

      object-fit: cover;

      display: block;

      background: #111;

    }

    .work-item .text {

      font-family: 'Playfair Display', serif;

      background: none;

      color: #fff;

      text-align: center;

      font-weight: 700;

      padding: 0.7rem 0.5rem 0 0.5rem;

      font-size: 1.7rem;

      letter-spacing: 1px;

      width: 100%;

      box-shadow: none;

      z-index: 2;

      margin-top: 0.5rem;

      text-shadow: 0 2px 8px #000a;

    }

    /* CONTACT FORM (FOOTER STYLE) */

    .contact-footer {

      width: 100vw;

      background: linear-gradient(135deg, #181818 80%, #23232b 100%);

      color: #fff;

      padding: 3.5rem 0 2.5rem 0;

      display: flex;

      flex-direction: column;

      align-items: center;

      box-shadow: 0 -2px 32px #000a;

      margin-top: 4rem;

      z-index: 2;

    }

    .contact-footer h2 {

      font-family: 'Playfair Display', serif;

      font-size: 2.7rem;

      font-weight: 700;

      margin-bottom: 0.5rem;

      letter-spacing: 1px;

      text-align: center;

    }

    .contact-footer p {

      font-size: 1.1rem;

      color: #ccc;

      margin-bottom: 2.2rem;

      text-align: center;

      max-width: 600px;

    }

    .contact-form {

      width: 100%;

      max-width: 600px;

      display: flex;

      flex-direction: column;

      gap: 1.2rem;

      background: rgba(20, 20, 20, 0.7);

      border-radius: 18px;

      padding: 2.2rem 2rem 1.5rem 2rem;

      box-shadow: 0 2px 24px #0005;

    }

    .contact-form-row {

      display: flex;

      gap: 1.2rem;

      width: 100%;

    }

    .contact-form-row input {

      flex: 1;

    }

    .contact-form input,
    .contact-form textarea {

      background: #181818;

      border: 1px solid #333;

      color: #fff;

      font-family: 'Merriweather', serif;

      padding: 0.9rem 1.1rem;

      border-radius: 8px;

      font-size: 1rem;

      resize: none;

      width: 100%;

      box-sizing: border-box;

      transition: border 0.2s;

    }

    .contact-form input:focus,
    .contact-form textarea:focus {

      border: 1.5px solid #fff;

      outline: none;

    }

    .contact-form textarea {

      min-height: 80px;

      max-height: 200px;

    }

    .contact-form button {

      background: #fff;

      color: #181818;

      font-family: 'Playfair Display', serif;

      font-size: 1.15rem;

      border: none;

      border-radius: 8px;

      padding: 1rem 0;

      cursor: pointer;

      font-weight: bold;

      letter-spacing: 1px;

      margin-top: 0.5rem;

      box-shadow: 0 2px 8px #000a;

      transition: background 0.2s, color 0.2s;

      width: 100%;

    }

    .contact-form button:hover {

      background: #222;

      color: #fff;

    }

    @media (max-width: 900px) {

      .works-grid {

        grid-template-columns: 1fr;

        gap: 1.5rem;

        padding: 0.5rem 0 1.5rem 0;

        margin: 0;

        max-width: 100vw;

        width: 100vw;

        overflow-x: hidden;

        justify-items: center;

      }

      .work-item {

        width: 100%;

        max-width: 99vw;

        min-height: 480px;

        height: 480px;

        box-sizing: border-box;

        display: flex;

        flex-direction: column;

        align-items: center;

      }

      .work-item img,

      .work-item video {

        width: 100%;

        max-width: 99vw;

        min-height: 440px;

        height: 440px;

        border-radius: 20px;

        display: block;

        object-fit: cover;

        background: #111;

      }

      .work-item:last-child {

        margin-top: 2.5rem;

      }

      .work-item .text {

        font-size: 1.2rem;

        margin-top: 0.7rem;

        width: 100%;

        text-align: center;

      }

    }

    @media (max-width: 700px) {

      .work-item {

        max-width: 99vw;

        min-height: 320px;

        height: 320px;

      }

      .work-item img,

      .work-item video {

        max-width: 99vw;

        min-height: 280px;

        height: 280px;

        border-radius: 14px;

      }

      .work-item:last-child {

        margin-top: 2rem;

      }

    }

    @media (max-width: 500px) {

      .ourworks-header h1 {

        font-size: 1.3rem;

      }

      .work-item {

        height: 180px;

      }

      .work-item img,

      .work-item video {

        height: 120px;

        border-radius: 10px;

      }

    }
  </style>

</head>

<body>

  <!-- Yıldız animasyonu kaldırıldı -->

  <!-- NAVBAR -->

  <nav class="navbar">

    <a href="index.html" class="logo">ZEK.ART</a>

    <div class="hamburger-wrapper">

      <img src="images/hamburger.png" alt="Menu" class="hamburger" id="hamburger-btn" />

    </div>

  </nav>

  <!-- MOBILE MENU -->

  <div class="mobile-menu" id="mobile-menu">

    <ul>

      <li><a href="index.html">Home</a></li>

      <li><a href="production.html">Production</a></li>

      <li><a href="about.html">About</a></li>

      <li><a href="ourworks.html#contact-footer">Contact</a></li>

      <li><a href="https://www.instagram.com/zekakll?igsh=emlia3Z1d2NhcW44" target="_blank">Instagram</a></li>

    </ul>

  </div>

  <div class="page-wrapper">

    <div class="main-content">

      <div class="ourworks-header">

        <h1>Production</h1>

        <div class="down-arrow" id="scroll-to-contact" title="Contact'a in">

          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">

            <path d="M10 15L19 24L28 15" stroke="#fff" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />

          </svg>

        </div>

      </div>

      <div class="works-grid">

        <!-- Work 1 -->

        <div class="work-item">

          <div class="spotlight"></div>

          <a href="index.html">

            <img src="images/31.jpg" alt="Portfolio" loading="lazy">

          </a>

          <div class="text">Portfolio</div>

        </div>



        <div class="work-item">

          <div class="spotlight ai-spotlight"></div>

          <a href="portfolio.html">

            <img src="images/imagen2/1.1.jpg" alt="AI Production" loading="lazy">

          </a>

          <div class="text">AI Production</div>

        </div>



        <div class="work-item">

          <div class="spotlight"></div>

          <a href="videos.html">

            <video autoplay muted loop playsinline>

              <source src="images/videos/IPEK_DIGICOVER.mp4" type="video/mp4">

              Your browser does not support the video tag.

            </video>

          </a>

          <div class="text">Videos</div>

        </div>

      </div>



    </div>

  </div>

  <footer class="contact-footer" id="contact-footer">

    <h2>Coming soon, contact: budak@zek.art <span style="font-size:1.2em;"></span></h2>

    <p></p>

    <form class="contact-form" action="mailto:budak@zek.art" method="POST" enctype="text/plain">

      <div class="contact-form-row">

        <input type="text" name="first_name" placeholder="First name" required>

        <input type="text" name="last_name" placeholder="Last name" required>

      </div>

      <div class="contact-form-row">

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="subject" placeholder="Subject" required>

      </div>

      <textarea name="message" placeholder="Message" required></textarea>

      <button type="submit">Send message</button>

    </form>

  </footer>

  <script src="js/navbar.js" defer></script>

  <script>

    const menuBtn = document.getElementById("hamburger-btn");

    const mobileMenu = document.getElementById("mobile-menu");



    menuBtn.addEventListener("click", () => {

      mobileMenu.classList.toggle("show");

    });



    document.addEventListener("click", (e) => {

      if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {

        mobileMenu.classList.remove("show");

      }

    });



    document.getElementById('scroll-to-contact').addEventListener('click', function () {

      document.getElementById('contact-footer').scrollIntoView({ behavior: 'smooth' });

    });



    // Yıldız animasyonu kaldırıldı

  </script>

</body>

</html>
