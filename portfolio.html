    .gallery-container {

    .gallery-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      transition: transform 0.3s;
      cursor: pointer;
    }
    .gallery-item:hover {
      transform: scale(1.03);
    }
    .hover-pair img.second {
      opacity: 0;
    }
    .hover-pair:hover img.first {
      opacity: 0;
    }
    .hover-pair:hover img.second {
      opacity: 1;
    }
    .hover-pair img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.4s ease-in-out;
    }
    .gallery-img, .gallery-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }
    .gallery-item.hidden {
  opacity: 0;
  transform: translateY(50px);
  transition: all 0.8s ease;
}

.gallery-item.visible {
  opacity: 1;
  transform: translateY(0);
}
.gallery-img {
  transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
  transform-origin: center center;
  will-change: transform, filter;
}

.gallery-item:hover .gallery-img {
  transform: scale(1.08);
  filter: contrast(1.1) brightness(1.05) saturate(1.1);
}

  <script>
    document.querySelectorAll('.gallery-video').forEach(video => {
      video.addEventListener('mouseenter', () => video.play());
      video.addEventListener('mouseleave', () => video.pause());
    });

    const menuBtn = document.getElementById("hamburger-btn");
    const mobileMenu = document.getElementById("mobile-menu");
    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("show");
    });

    document.querySelectorAll('.gallery-img').forEach(img => {
      img.addEventListener('click', () => {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = img.src;
        lightbox.style.display = 'flex';
      });
    });
    document.addEventListener("DOMContentLoaded", () => {
  const images = document.querySelectorAll('.gallery-item');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    threshold: 0.2
  });

  images.forEach(img => {
    img.classList.add('hidden');
    observer.observe(img);
  });
});
document.querySelectorAll('.gallery-item').forEach(item => {
  item.addEventListener('mousemove', e => {
    const rect = item.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    item.querySelector('img').style.transform = `scale(1.08) translate(${x * 10}px, ${y * 10}px)`;
  });

  item.addEventListener('mouseleave', () => {
    item.querySelector('img').style.transform = 'scale(1)';
  });
});

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox' || e.target.id === 'lightbox-img') {
        document.getElementById('lightbox').style.display = 'none';
      }
    });
  </script>
