<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      background: #111;
      color: #fff;
      font-family: 'Playfair Display', serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* #stars-bg kaldırıldı */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 60px;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 3000;
      box-shadow: 0 2px 16px #0002;
    }

    .logo {
      color: #fff;
      font-size: 1.7rem;
      font-family: 'Playfair Display', serif;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 0.1em;
    }

    .hamburger-wrapper {
      cursor: pointer;
      z-index: 3100;
      display: flex;
      align-items: center;
    }

    .hamburger {
      width: 30px;
      height: 30px;
    }

    .mobile-menu {
      position: fixed;
      top: 60px;
      right: 0;
      width: 220px;
      height: calc(100vh - 60px);
      background: rgba(0, 0, 0, 0.97);
      transition: transform 0.3s;
      transform: translateX(100%);
      z-index: 3050;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
      box-shadow: -2px 0 16px rgba(0, 0, 0, 0.2);
    }

    .mobile-menu.show {
      transform: translateX(0);
    }

    .mobile-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
      text-align: center;
    }

    .mobile-menu ul li {
      margin: 1.2rem 0;
    }

    .mobile-menu ul li a {
      color: #fff;
      font-size: 1.2rem;
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .mobile-menu ul li a:hover {
      color: #ffb300;
    }

    /* MAIN CONTENT */
    .page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      min-height: calc(100vh - 60px);
      padding-top: 60px;
      box-sizing: border-box;
      z-index: 1;
    }

    .ourworks-header {
      text-align: left;
      margin-bottom: 2.2rem;
      position: relative;
      max-width: 1200px;
      margin-left: 0;
      margin-right: auto;
      padding-left: 2vw;
    }

    .ourworks-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4.2rem;
      letter-spacing: 2px;
      color: #fff;
      font-weight: 700;
      margin-top: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: none;
      position: relative;
      z-index: 2;
      text-align: left;
    }

    /* Ok */
    .down-arrow {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-top: 0.2rem;
      margin-left: 0.2rem;
      cursor: pointer;
      animation: bounce 1.5s infinite;
      z-index: 3;
      position: relative;
      width: 38px;
      height: 38px;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(12px);
      }
    }

    /* Kutular ve spotlight */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 3.5rem;
      justify-items: center;
      align-items: start;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .work-item {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
      width: 340px;
      height: 340px;
      /* kare yapıldı */
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s;
      position: relative;
    }

    .work-item:hover {
      transform: scale(1.06) translateY(-10px);
    }

    .work-item:hover {
      transform: scale(1.06) translateY(-10px);
      z-index: 2;
    }

    /* Işık efekti kaldırıldı */
    .work-item img,
    .work-item video {
      width: 340px;
      height: 340px;
      object-fit: cover;
      border-radius: 0;
      position: relative;
      z-index: 2;
      box-shadow: none;
      display: block;
    }

    .work-item .text {
      font-family: 'Playfair Display', serif;
      background: none;
      color: #fff;
      text-align: center;
      font-weight: 700;
      padding: 0.7rem 0.5rem 0 0.5rem;
      font-size: 1.7rem;
      letter-spacing: 1px;
      width: 100%;
      box-shadow: none;
      z-index: 2;
      margin-top: 0.5rem;
      text-shadow: 0 2px 8px #000a;
    }

    /* CONTACT FORM (FOOTER STYLE) */
    .contact-footer {
      width: 100vw;
      background: linear-gradient(135deg, #181818 80%, #23232b 100%);
      color: #fff;
      padding: 3.5rem 0 2.5rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 -2px 32px #000a;
      margin-top: 4rem;
      z-index: 2;
    }

    .contact-footer h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.7rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
      text-align: center;
    }

    .contact-footer p {
      font-size: 1.1rem;
      color: #ccc;
      margin-bottom: 2.2rem;
      text-align: center;
      max-width: 600px;
    }

    .contact-form {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      background: rgba(20, 20, 20, 0.7);
      border-radius: 18px;
      padding: 2.2rem 2rem 1.5rem 2rem;
      box-shadow: 0 2px 24px #0005;
    }

    .contact-form-row {
      display: flex;
      gap: 1.2rem;
      width: 100%;
    }

    .contact-form-row input {
      flex: 1;
    }

    .contact-form input,
    .contact-form textarea {
      background: #181818;
      border: 1px solid #333;
      color: #fff;
      font-family: 'Merriweather', serif;
      padding: 0.9rem 1.1rem;
      border-radius: 8px;
      font-size: 1rem;
      resize: none;
      width: 100%;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border: 1.5px solid #fff;
      outline: none;
    }

    .contact-form textarea {
      min-height: 80px;
      max-height: 200px;
    }

    .contact-form button {
      background: #fff;
      color: #181818;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      border: none;
      border-radius: 8px;
      padding: 1rem 0;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      box-shadow: 0 2px 8px #000a;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }

    .contact-form button:hover {
      background: #222;
      color: #fff;
    }

    /* Message Status Styles */
    .message-status {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-align: center;
    }

    .message-status.success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4CAF50;
      opacity: 1;
    }

    .message-status.error {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.3);
      color: #F44336;
      opacity: 1;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .works-grid {
        flex-direction: column;
        align-items: center;

      }

      .work-item img,
      .work-item video {
        width: 90vw;
        max-width: 340px;
        height: 90vw;
        max-height: 340px;
        object-fit: cover;
        border-radius: 24px;
        position: relative;
        z-index: 2;
        box-shadow: 0 8px 48px #0008;
        display: block;
      }
    }

    @media (max-width: 700px) {
      .contact-form {
        padding: 1.2rem 0.5rem 1rem 0.5rem;
      }

      .contact-form-row {
        flex-direction: column;
        gap: 0.7rem;
      }

      .ourworks-header h1 {
        font-size: 2.2rem;
      }
    }

    /* Loader Styles */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .loader-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #fff;
      text-shadow: 0 2px 8px #000a;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <div id="loader">
    <section>
      <article>
        <p>
          ZEK.ART PRODUCTION
          <span data-text="ZEK.ART PRODUCTION"></span>
          <span data-text="ZEK.ART PRODUCTION"></span>
        </p>
      </article>
    </section>
  </div>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">ZEK.ART</a>
    <div class="hamburger-wrapper">
      <img src="images/hamburger.png" alt="Menu" class="hamburger" id="hamburger-btn" />
    </div>
  </nav>
  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="ourworks.html">Production</a></li>
      <li><a href="#contact-footer">Contact</a></li>
      <li><a href="https://www.instagram.com/zekakll?igsh=emlia3Z1d2NhcW44" target="_blank">Instagram</a></li>
    </ul>
  </div>
  <div class="page-wrapper">
    <div class="main-content">
      <div class="ourworks-header">
        <h1>Production</h1>
        <div class="down-arrow" id="scroll-to-contact" title="Contact'a in">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 15L19 24L28 15" stroke="#fff" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </div>
      <div class="works-grid">
        <!-- Work 1 -->
        <div class="work-item">
          <a href="index.html">
            <img src="images/31.jpg" alt="Portfolio" loading="lazy">
          </a>
          <div class="text">Portfolio</div>
        </div>


        <div class="work-item">
          <a href="portfolio.html">
            <img src="images/imagen2/1.1.jpg" alt="AI Production" loading="lazy">
          </a>
          <div class="text">AI Production</div>
        </div>


        <div class="work-item">
          <a href="videos.html">
            <video autoplay muted loop playsinline>
              <source src="images/videos/IPEK_DIGICOVER.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </a>
          <div class="text">Videos</div>
        </div>
      </div>



    </div>
  </div>
  <footer class="contact-footer" id="contact-footer">
    <h2>Contact</h2>
    <p>Get in touch with us for collaborations and inquiries</p>
    <form id="contact-form" class="contact-form" name="contact" method="POST" action="/send-email">
      <div class="contact-form-row">
        <input type="text" id="name" name="name" placeholder="Your Name" required>
        <input type="email" id="email" name="email" placeholder="Your Email" required>
      </div>
      <div class="contact-form-row">
        <input type="text" id="subject" name="subject" placeholder="Subject" required>
      </div>
      <textarea id="message" name="message" placeholder="Your Message" required></textarea>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
    <div id="message-status" class="message-status"></div>
  </footer>
  <script>
    // Hamburger Menü Açma/Kapama
    document.addEventListener("DOMContentLoaded", () => {
      const menuBtn = document.getElementById("hamburger-btn");
      const mobileMenu = document.getElementById("mobile-menu");
      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle("show");
      });
      document.addEventListener("click", (e) => {
        if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          mobileMenu.classList.remove("show");
        }
      });
      // Ok ile contact'a kaydır
      document.getElementById('scroll-to-contact').addEventListener('click', function () {
        document.getElementById('contact-footer').scrollIntoView({ behavior: 'smooth' });
      });

      // Yeni: Nodemailer backend'e fetch ile gönderim
      const contactForm = document.getElementById('contact-form');
      const messageStatus = document.getElementById('message-status');

      contactForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(contactForm);
        const data = Object.fromEntries(formData.entries());

        const submitBtn = contactForm.querySelector('.submit-btn');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Sending...';
        submitBtn.disabled = true;

        try {
          const response = await fetch('https://zek.art/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (response.ok) {
            messageStatus.textContent = 'Message sent successfully! We will get back to you soon.';
            messageStatus.className = 'message-status success';
            contactForm.reset();
          } else {
            messageStatus.textContent = 'There was an error sending your message. Please try again later.';
            messageStatus.className = 'message-status error';
          }
        } catch (err) {
          messageStatus.textContent = 'There was an error sending your message. Please try again later.';
          messageStatus.className = 'message-status error';
        }

        submitBtn.textContent = originalText;
        submitBtn.disabled = false;

        setTimeout(() => {
          messageStatus.className = 'message-status';
        }, 5000);
      });
    });
    // Yıldız animasyonu kaldırıldı

    // --- Güvenlik: Sağ tık, sürükleme ve kısayol engelleme ---
    // Sağ tık menüsünü img ve video üzerinde engelle
    document.addEventListener('contextmenu', function (e) {
      if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
        e.preventDefault();
      }
    });
    // Resimlerin sürüklenmesini engelle
    document.querySelectorAll('img, video').forEach(function (el) {
      el.setAttribute('draggable', 'false');
      el.addEventListener('dragstart', function (e) { e.preventDefault(); });
    });
    // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+Shift+C engelle
    document.addEventListener('keydown', function (e) {
      if (e.key === 'F12') e.preventDefault();
      if ((e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C')) ||
        (e.ctrlKey && (e.key === 'U' || e.key === 'S'))) {
        e.preventDefault();
      }
    });
    // --- Son ---
    window.addEventListener('DOMContentLoaded', function () {
      var p = document.querySelector('#loader p');
      function hideLoader() {
        document.getElementById('loader').style.display = 'none';
      }
      p.addEventListener('click', hideLoader);
      p.addEventListener('touchstart', hideLoader);
    });
  </script>
</body>

</html>
