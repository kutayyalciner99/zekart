    <style>

    body {

      margin: 0;

      padding: 0;

      background-color: black;

      color: white;

     font-family: 'Playfair Display', serif;

    }



    .navbar {

      position: fixed;

      top: 0;

      left: 0;

      right: 0;

      background: black;

      padding: 20px 40px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      z-index: 999;

    }



 /* Navbar */

.navbar {

  position: fixed;

  top: 0;

  left: 0;

  width: 100%;

  height: 60px;

  background: rgba(0, 0, 0, 0.6);

  backdrop-filter: blur(8px);

  display: flex;

  justify-content: space-between;

  align-items: center;

  padding: 0 2rem;

  z-index: 1000;

}



.logo {

  font-size: 1.8rem;

  font-weight: bold;

  color: white;

  text-decoration: none;

  cursor: pointer;

}



.hamburger-wrapper {

  cursor: pointer;

  z-index: 1100;

}



.hamburger {

  width: 28px;

  height: auto;

}



/* Mobile Menu */

.mobile-menu {

  position: fixed;

  top: 0;

  right: -100%;

  width: 70%;

  height: 100vh;

  background: rgba(0, 0, 0, 0.95);

  backdrop-filter: blur(5px);

  transition: right 0.4s ease;

  display: flex;

  align-items: center;

  justify-content: center;

  z-index: 1050;

}



.mobile-menu ul {

  list-style: none;

  text-align: center;

}



.mobile-menu ul li {

  margin: 1.5rem 0;

}



.mobile-menu ul li a {

  color: white;

  font-size: 1.5rem;

  text-decoration: none;

  font-weight: 500;

  transition: 0.3s ease;

}



.mobile-menu ul li a:hover {

  color: #FF6500;

}



.mobile-menu.show {

  right: 0;

}



    h1 {

      font-size: 2.5rem;

    .brand-section h2 {

    .video-grid {

      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

      gap: 20px;

    }



    .card {

      position: relative;

      overflow: hidden;

      border-radius: 14px;

      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);

      background: #111;

      height: 400px;

      display: flex;

      align-items: center;

      justify-content: center;

    }



    video.portrait {

      object-fit: cover;

      width: auto;

      height: 100%;

      aspect-ratio: 9 / 16;

      border-radius: 14px;

    }



    .card video {

      width: 100%;

      height: 100%;

      object-fit: cover;

      transition: transform 0.4s ease;

      border-radius: 14px;

    }

    .video-portrait-grid {

  display: grid;

  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

  gap: 24px;

  justify-items: center;

}



.card.portrait-hover {

  position: relative;

  overflow: hidden;

  width: 100%;

  aspect-ratio: 9 / 16;

  max-width: 360px;

  border-radius: 16px;

  background: #111;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  transition: transform 0.3s ease-in-out;

}



.card.portrait-hover video {

  width: 100%;

  height: 100%;

  object-fit: cover;

  transition: transform 0.4s ease;

  border-radius: 16px;

}



.card.portrait-hover::after {

  content: '';

  position: absolute;

  inset: 0;

  backdrop-filter: blur(12px);

  background-color: rgba(0, 0, 0, 0.2);

  opacity: 0;

  transition: opacity 0.3s ease;

  z-index: 2;

}



.card.portrait-hover:hover video {

  transform: scale(1.08);

  z-index: 3;

}



.card.portrait-hover:hover::after {

  opacity: 1;

}





    .card:hover video {

      transform: scale(1.05);

    }



    @media (max-width: 768px) {

      .card {

        height: 220px;

      }

      .navbar {

        padding: 0 1rem;

        height: 50px;

      .brand-section {

      h1 {

      }

      .mobile-menu {

        width: 90%;

      }

      .mobile-menu ul li {

        margin: 1rem 0;

      }

      .mobile-menu ul li a {

    }

    .card.hover-zoom {

  position: relative;

  overflow: hidden;

  border-radius: 14px;

  background: #111;

  height: 400px;

  display: flex;

  align-items: center;

  justify-content: center;

  box-shadow: 0 15px 45px rgba(0,0,0,0.6);

  transition: transform 0.3s ease-in-out;

}



.card.hover-zoom::after {

  content: "";

  position: absolute;

  top: 0; left: 0; width: 100%; height: 100%;

  backdrop-filter: blur(15px);

  background: rgba(0, 0, 0, 0.2);

  opacity: 0;

  transition: opacity 0.4s ease;

  z-index: 2;

  pointer-events: none;

}



.card.hover-zoom video {

  width: 100%;

  height: 100%;

  object-fit: cover;

  transition: transform 0.4s ease;

  z-index: 1;

  border-radius: 14px;

}



.card.hover-zoom:hover video {

  transform: scale(1.08);

  z-index: 3;

}



.card.hover-zoom:hover::after {

  opacity: 1;

}

  <!-- SCRIPT FOR MENU -->

  <script>

    const menuBtn = document.getElementById("hamburger-btn");

    const mobileMenu = document.getElementById("mobile-menu");



    menuBtn.addEventListener("click", () => {

      mobileMenu.classList.toggle("show");

    });



    document.addEventListener("click", (e) => {

      if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {

        mobileMenu.classList.remove("show");

      }

    });

  

  document.querySelectorAll('.card').forEach(card => {

    card.addEventListener('mouseover', () => {

      card.classList.add('active');

    });



    card.addEventListener('mouseout', () => {

      card.classList.remove('active');

    });

  });



  </script>
